<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitea-kanban</title>
    <!--
      CSP（02-architecture.md §9.3）
      - default-src 'self'：只允许同源资源
      - script-src 'self'：禁止 inline script（Vite 走 ESM 加载）
      - style-src 'self' 'unsafe-inline'：允许 scoped style 内联（Vite dev 模式需要）
      - img-src 'self' data: http: https:：允许头像
        · 'self' / data: = 同源 + base64
        · http: / https: = 通配覆盖 gitea 本地服务（http://127.0.0.1:3000）+ 公网头像
        · 生产模式 CSP 由 src/main/window.ts 的 webRequest 注入（更严，按 giteaUrl 加白名单）
      - connect-src 'self' ws: http: https:：Vite HMR 走 ws:// + 同源 fetch + gitea 直连备用
      - font-src 'self' data:：本地字体走 data URI；v1 字体走 Google Fonts CDN 需要补充
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' ws: http: https:; font-src 'self' data:"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitea-kanban</title>
    <!--
      CSP（02-architecture.md §9.3）
      - default-src 'self'：只允许同源资源
      - script-src 'self'：禁止 inline script（Vite 走 ESM 加载）
      - style-src 'self' 'unsafe-inline'：允许 scoped style 内联（Vite dev 模式需要）
      - img-src 'self' data: https:：允许头像（gitea 头像走 https）
      - connect-src 'self'：渲染端不走 HTTP（gitea 调用都走 main 端）
      - font-src 'self' data:：本地字体走 data URI；v1 字体走 Google Fonts CDN 需要补充
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

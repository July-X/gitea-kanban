<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gitea-kanban</title>
    <!--
      CSP（02-architecture.md §9.3 + design-system/pages/tech-refine.md §15.5）
      - default-src 'self'：只允许同源资源
      - script-src 'self' 'unsafe-inline'：v1.1.2 主题切换需要 inline bootstrap script
        （启动期 0 闪烁硬约束；vite ESM 模块加载是异步的，达不到 theme-init 要求）
        · 安全 tradeoff：仅本项目唯一 inline script，只读 localStorage + 写 dataset.theme
        · enum 白名单（dark / light · v1.2 收敛），攻击面极小
        · 2026-06-12 收口：src/main/window.ts installCspHeader 已改用 sha256 hash
          白名单替代 'unsafe-inline'（dev/prod 同源行为；常量 THEME_BOOTSTRAP_SCRIPT_HASH）。
          ⚠️ 修改下方 <script> 内容（含缩进 / 注释 / 换行）必须同步更新那个常量。
      - style-src 'self' 'unsafe-inline'：允许 scoped style 内联（Vite dev 模式需要）
      - img-src 'self' data: http: https:：允许头像
        · 'self' / data: = 同源 + base64
        · http: / https: = 通配覆盖 gitea 本地服务（http://127.0.0.1:3000）+ 公网头像
        · 生产模式 CSP 由 src/main/window.ts 的 webRequest 注入（更严，按 giteaUrl 加白名单）
      - connect-src 'self' ws: http: https:：Vite HMR 走 ws:// + 同源 fetch + gitea 直连备用
      - font-src 'self' data:：本地字体走 data URI；v1 字体走 Google Fonts CDN 需要补充
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' ws: http: https:; font-src 'self' data:"
    />
    <!--
      主题 bootstrap script —— v1.1.2 启动期 0 闪烁硬约束（tech-refine §15.5）
      ============================================================
      必须在 main.ts ESM 加载前同步执行：
      - vite dev 模式：main.ts 模块解析 + Pinia + createApp ≈ 100-300ms 才到 initTheme
      - 这段时间 CSS 走默认 :root 主题（dark）
      - 如果用户上次切到 light → 闪一下默认色 → 跳到正确色

      解决方案：head 内 inline script（parse-time 同步执行），
      同步读 localStorage 'gitea-kanban.theme' → 设 documentElement.dataset.theme。

      防御：
      - try/catch 包住（localStorage 不可用 / 隐私模式 / quota 满 → 静默走默认）
      - enum 白名单校验（不传任意字符串到 dataset.theme，防恶意注入）
      - 不写 localStorage（启动期仅读；spec 拍板 "启动期不能写新的 localStorage key"）
      - 不发任何 fetch / 不 import 任何 module（pure sync DOM API）

      主进程 reconcile：useUiStore().initTheme() 在 main.ts mount 后异步调 IPC get，
      与 localStorage 不一致时自动覆盖（backend prefs.theme 是 source of truth）。
    -->
    <script>
      try {
        var t = localStorage.getItem('gitea-kanban.theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {
        // localStorage 不可用 / 隐私模式 → 静默走默认 :root（dark）
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

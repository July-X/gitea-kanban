# gitea 本地测试服务
#
# 这是**测试服务**——只是给 gitea-kanban 开发期做联调用。
# 不会自动启动，需要时手动 `docker compose up -d`，不用时 `docker compose down`。
#
# 文档参考：https://docs.gitea.com/zh-cn/installation/install-with-docker
# 镜像使用钉版本 1.26.2（不用 :latest，文档明确警告 latest 是 dev 版）
#
# 数据全部落到本目录的子目录（./data），不污染仓库根，
# 也不会跟着 git 走（已在 .gitignore 排除）。
#
# 默认账户（首次启动后访问 http://localhost:3000 完成安装向导）：
#   数据库类型：sqlite3（无需额外 db 容器，最简）
#   SSH 端口：2222（避开主机 22）
#   HTTP 端口：3000

services:
  server:
    image: docker.gitea.com/gitea:1.26.2
    container_name: gitea-kanban-test
    environment:
      # 用当前用户 UID/GID 匹配 data 目录权限（macOS 501:20）
      - USER_UID=501
      - USER_GID=20
      # 默认域名 / 协议 / 端口——本地测试用
      - DOMAIN=localhost
      - SSH_DOMAIN=localhost
      - SSH_PORT=2222
      - HTTP_PORT=3000
      - ROOT_URL=http://localhost:3000
      # 数据库：sqlite3 最简，无需 mysql/postgres 容器
      - GITEA__database__DB_TYPE=sqlite3
      # 安装后立即锁住安装页，避免误操作
      - INSTALL_LOCK=false
    restart: "no"   # 关键：默认不随 docker daemon 自启，纯粹手动管理
    volumes:
      # 全部数据落本地 ./data
      - ./data:/data
      # 时区同步
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"   # HTTP
      - "2222:22"     # SSH
    # healthcheck：起完可看 docker compose ps 知道是不是真活了
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

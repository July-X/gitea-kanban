name: build
on:
  push:
    branches: [main, feat/v0.7.0]
  pull_request:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  # macOS 构建（Apple Silicon + Intel universal binary）
  build-macos:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Go 测试
        run: go test ./app/... -count=1

      - name: 构建（universal binary）
        run: wails build -platform darwin/universal -clean -o gitea-kanban.app

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gitea-kanban-macos-amd64
          path: build/bin/gitea-kanban.app
          if-no-files-found: error

  # Windows 构建（v0.6/v0.7 暂未跑通，记下来给团队评估）
  # 跑 Windows runner 需要 wails.exe + WebView2（runner 默认已有）。
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 前端依赖
        working-directory: frontend
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Go 测试
        shell: pwsh
        run: go test ./app/... -count=1

      - name: 构建
        shell: pwsh
        run: wails build -platform windows/amd64 -clean -o gitea-kanban.exe

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gitea-kanban-windows
          path: build/bin/gitea-kanban.exe
          if-no-files-found: error

  # Linux 构建（v0.6+ 已暂缓；用户大多在 macOS/Windows 上跑，本机端开发为主）
  # 完整跑通需要 webkit2gtk-4.0-dev / libgtk-3-dev / pkg-config / build-essential 等。
  # 见 https://wails.io/docs/gettingstarted/installation#linux
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config build-essential

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Go 测试
        run: go test ./app/... -count=1

      - name: 构建
        run: wails build -platform linux/amd64 -clean -o gitea-kanban.appimage

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: gitea-kanban-linux
          path: build/bin/gitea-kanban.appimage
          if-no-files-found: error

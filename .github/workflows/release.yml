# release.yml —— v0.8.0 自动发版 workflow
#
# 触发条件：推送 tag `v*`（如 v0.8.0 / v0.8.0-rc1）时自动跑：
#   1. matrix build（macOS amd64 + windows amd64 双平台，不含 Linux 和 arm64）
#   2. 收集所有 build artifacts 到单一 job（release-publish）
#   3. 对每个 asset 跑 cmd/sign sign 生成 .sig 文件
#   4. 跑 cmd/sign manifest 生成 latest.json
#   5. 调 gh release create 上传所有产物 + 删除 pre-release tag 的旧 release
#
# ⚠️ 必需 GitHub Secrets：
#   - SIGN_PRIVATE_KEY：cmd/sign genkey 生成的加密私钥（base64 单行）
#   - SIGN_PASSWORD：解密私钥的密码（argon2id 派生）
#
# Maintainer 首次 setup：
#   1. go run ./cmd/sign genkey ./keys --password "$pwd"
#   2. cat ./keys/gitea-kanban-private.b64 | pbcopy
#   3. GitHub → Settings → Secrets → New repository secret
#      Name: SIGN_PRIVATE_KEY  Value: <粘贴>
#   4. Name: SIGN_PASSWORD     Value: <pwd>
#   5. 把公钥粘到 app/updater/verify.go 的 PublicKeyB64 常量并 commit

name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.8.0 / v0.8.0-rc1)'
        required: true

permissions:
  contents: write  # 允许 gh release create / upload

jobs:
  # ===== Stage 1: 跨平台 build matrix =====
  build:
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # v0.8.0 仅 stable + Windows/macOS 双平台 + Intel (amd64) 单架构
        # Linux / arm64 暂不在 v0.8.0 范围（plan v0.8.0.md 红线）
        include:
          - os: macos-14
            platform: darwin
            arch: amd64
            artifact: gitea-kanban-macos-amd64
            output: gitea-kanban.app
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: gitea-kanban-windows-amd64
            output: gitea-kanban.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
        shell: bash

      - name: 前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 前端 build（生成 dist/ 给 Go embed）
        working-directory: frontend
        run: pnpm run build

      - name: 前端 typecheck
        working-directory: frontend
        run: pnpm run typecheck

      # 必须放在 pnpm build 之后：main.go 用 //go:embed all:frontend/dist 嵌入前端资源，
      # 没有 dist/ 会导致 go build 和 go test 一起 setup failed（FAIL: pattern all:frontend/dist: no matching files）
      # 用 GOOS/GOARCH env 显式指定（windows runner 默认 GOARCH=amd64 但 darwin-14 runner 是 arm64；
      # 必须显式 amd64 才能嵌入 windows 二进制 + macOS Intel 二进制）
      # 注意：windows runner 的 shell 是 PowerShell，GOOS=windows go test 这种 env inline 写法不可用，
      # 必须用 GitHub Actions env 字段（PowerShell 通过 $env:GOOS 读）
      - name: Go 测试（含 cmd/sign + app/updater）
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: go test ./... -count=1

      # macOS / Windows 都用 wails build 加 -ldflags 注入版本号
      # 注意：不传 -o，wails build 默认输出到 build/bin/<appname>.app (mac)
      # 或 build/bin/<appname>.exe (windows)。早期传 -o gitea-kanban.app 时
      # go build 把 .app 当 binary 输出文件，wails packaging 想 mkdir 同名目录失败。
      - name: 构建（macOS / Windows 通用）
        run: |
          wails build \
            -platform ${{ matrix.platform }}/${{ matrix.arch }} \
            -clean \
            -ldflags "-X main.appVersion=${{ github.ref_name }} -X main.appChannel=stable"
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.output }}
          if-no-files-found: error

  # ===== Stage 2: sign + publish =====
  publish:
    name: sign · manifest · publish
    # v0.8.0 rc17 fix：if: always() 让 windows FAIL 也能 release macOS
    #（master HEAD windows 7 个 bug 未修，强行等 build 全 PASS → publish 永远 skipped）
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 下载 2 个 build artifact（continue-on-error 让 windows FAIL 也能 release macOS）
      - name: 下载 macOS amd64 build
        uses: actions/download-artifact@v4
        with:
          name: gitea-kanban-macos-amd64
          path: build/bin/
        continue-on-error: true

      - name: 下载 Windows amd64 build
        uses: actions/download-artifact@v4
        with:
          name: gitea-kanban-windows-amd64
          path: build/bin/
        continue-on-error: true

      - name: 检查必需 secrets（可选：缺失时 release raw build 不签名）
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
        run: |
          # v0.8.0 rc18 fix：secrets 缺失只 warn 不 exit 1
          #（CI 上 maintainer 还没设 secrets，但用户仍想看 raw build 能否 release）
          if [[ -z "$SIGN_PRIVATE_KEY" ]]; then
            echo "WARN: SIGN_PRIVATE_KEY secret is empty — release raw build（无签名）"
          fi
          if [[ -z "$SIGN_PASSWORD" ]]; then
            echo "WARN: SIGN_PASSWORD secret is empty — release raw build（无签名）"
          fi
          # 列出可用 asset
          echo "==> 可用 build artifacts:"
          ls -la build/bin/ 2>&1 || echo "(build/bin/ 为空 — 所有 build matrix 都 FAIL)"

      # 调用 scripts/release.sh 集成 zip + sign + manifest + verify 链
      #   v0.8.0：替换原本零碎的 8 个 bash step（step 167-219），减少 70+ 行重复
      #   并集中 future 维护点。CI 上 release.sh 默认产物写到 build/release/
      #   （RELEASE_DIR env override）。
      - name: 集成 sign + manifest（scripts/release.sh）
        if: env.SIGN_PRIVATE_KEY != '' && env.SIGN_PASSWORD != ''
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NOTES_FILE: docs/releases/${{ github.ref_name }}.md
          RELEASE_DIR: build/release
        run: bash scripts/release.sh "${{ github.ref_name }}"

      # raw build fallback（secrets 缺失时）：把 raw .app + .exe 直接发布，不签名
      - name: raw build fallback（无签名）
        if: env.SIGN_PRIVATE_KEY == '' || env.SIGN_PASSWORD == ''
        run: |
          mkdir -p build/release

          # 兼容 wails build 各种输出形态：
          #   - mac: build/bin/gitea-kanban.app/Contents/MacOS/gitea-kanban（macos 旧版）
          #   - mac: build/bin/Contents/MacOS/gitea-kanban（artifact 解压后 Contents 在 bin 下）
          #   - windows: build/bin/gitea-kanban.exe
          # 优先匹配带 .app 目录的形态，找不到就 fallback 到 .app/*/Contents/MacOS 形态
          if [[ -d build/bin/gitea-kanban.app ]]; then
            (cd build/bin && zip -r ../release/gitea-kanban-macos-amd64.zip gitea-kanban.app >/dev/null)
            echo "macOS raw build zipped (gitea-kanban.app dir)"
          elif [[ -f build/bin/Contents/MacOS/gitea-kanban ]]; then
            (cd build/bin && zip -r ../release/gitea-kanban-macos-amd64.zip Contents >/dev/null)
            echo "macOS raw build zipped (Contents dir, wails artifact 解压形态)"
          else
            echo "WARN: macOS .app 找不到（CI macos build 可能 FAIL）"
          fi

          if [[ -f build/bin/gitea-kanban.exe ]]; then
            cp build/bin/gitea-kanban.exe build/release/gitea-kanban-windows-amd64.exe
            echo "windows raw build copied"
          else
            echo "WARN: gitea-kanban.exe 找不到（CI windows build 可能 FAIL）"
          fi

          # 写一个 minimal latest.json（无签名的 placeholder）
          cat > build/release/latest.json << 'EOF'
          {
            "version": "${{ github.ref_name }}",
            "notes": "release built without signature (SIGN_PRIVATE_KEY secret missing) — see docs/releases/${{ github.ref_name }}.md",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "channel": "stable",
            "assets": []
          }
          EOF

          # 占位 .sig 文件（0 字节 + 注释），让 gh release create 检测到
          # （fallback 模式 release 是无签名的 raw build，sig 只是 placeholder
          # 防止 gh release create 报 "no matches found for *.sig"）
          for asset in build/release/gitea-kanban-macos-amd64.zip \
                       build/release/gitea-kanban-windows-amd64.exe \
                       build/release/latest.json; do
            if [[ -f "$asset" ]]; then
              echo "# placeholder signature (SIGN_PRIVATE_KEY secret missing)" > "${asset}.sig"
            fi
          done

          echo "==> build/release/ 内容:"
          ls -la build/release/

      # gh release create（v0.8.0：动态检测可用 asset，windows FAIL 也能 release macOS）
      - name: 创建 / 更新 GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 兼容 rc tag（如 v0.8.0-rc1）使用 --prerelease
          if [[ "${{ github.ref_name }}" == *"-rc"* ]] || [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            PRE_RELEASE_FLAG="--prerelease"
          else
            PRE_RELEASE_FLAG=""
          fi

          # 动态检测可用 asset（脚本 release.sh 已经把可用 asset sign/manifest 完成）
          AVAILABLE_ASSETS=()
          if [[ -f build/release/gitea-kanban-macos-amd64.zip ]]; then
            AVAILABLE_ASSETS+=(build/release/gitea-kanban-macos-amd64.zip)
            AVAILABLE_ASSETS+=(build/release/gitea-kanban-macos-amd64.zip.sig)
          else
            echo "WARN: gitea-kanban-macos-amd64.zip 缺失（macOS build FAIL）"
          fi
          if [[ -f build/release/gitea-kanban-windows-amd64.exe ]]; then
            AVAILABLE_ASSETS+=(build/release/gitea-kanban-windows-amd64.exe)
            AVAILABLE_ASSETS+=(build/release/gitea-kanban-windows-amd64.exe.sig)
          else
            echo "WARN: gitea-kanban-windows-amd64.exe 缺失（windows build FAIL）"
          fi
          if [[ -f build/release/latest.json ]]; then
            AVAILABLE_ASSETS+=(build/release/latest.json)
            AVAILABLE_ASSETS+=(build/release/latest.json.sig)
          fi

          if [[ ${#AVAILABLE_ASSETS[@]} -eq 0 ]]; then
            echo "ERROR: 无任何可用 asset，发布中止" >&2
            exit 1
          fi
          echo "==> 将上传 ${#AVAILABLE_ASSETS[@]} 个 asset:"
          printf '  %s\n' "${AVAILABLE_ASSETS[@]}"

          # 先看 release 是否已存在（workflow_dispatch 重跑场景）
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} 已存在，删除旧的再重建"
            gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes
          fi

          # 优先用 maintainer 写的 docs/releases/<tag>.md，没有就 fallback --generate-notes
          NOTES_ARGS=()
          if [[ -f "docs/releases/${{ github.ref_name }}.md" ]]; then
            NOTES_ARGS=(--notes-file "docs/releases/${{ github.ref_name }}.md")
          else
            echo "WARN: docs/releases/${{ github.ref_name }}.md 不存在，用 --generate-notes"
            NOTES_ARGS=(--generate-notes)
          fi

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "gitea-kanban ${{ github.ref_name }}" \
            $PRE_RELEASE_FLAG \
            "${NOTES_ARGS[@]}" \
            "${AVAILABLE_ASSETS[@]}"
        shell: bash

      - name: 清理临时私钥
        run: rm -f build/release/.private.b64
        shell: bash

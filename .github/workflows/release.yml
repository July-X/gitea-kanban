# release.yml —— v0.8.0 自动发版 workflow
#
# 触发条件：推送 tag `v*`（如 v0.8.0 / v0.8.0-rc1）时自动跑：
#   1. matrix build（macOS amd64 + windows amd64 双平台，不含 Linux 和 arm64）
#   2. 收集所有 build artifacts 到单一 job（release-publish）
#   3. 对每个 asset 跑 cmd/sign sign 生成 .sig 文件
#   4. 跑 cmd/sign manifest 生成 latest.json
#   5. 调 gh release create 上传所有产物 + 删除 pre-release tag 的旧 release
#
# ⚠️ 必需 GitHub Secrets：
#   - SIGN_PRIVATE_KEY：cmd/sign genkey 生成的加密私钥（base64 单行）
#   - SIGN_PASSWORD：解密私钥的密码（argon2id 派生）
#
# Maintainer 首次 setup：
#   1. go run ./cmd/sign genkey ./keys --password "$pwd"
#   2. cat ./keys/gitea-kanban-private.b64 | pbcopy
#   3. GitHub → Settings → Secrets → New repository secret
#      Name: SIGN_PRIVATE_KEY  Value: <粘贴>
#   4. Name: SIGN_PASSWORD     Value: <pwd>
#   5. 把公钥粘到 app/updater/verify.go 的 PublicKeyB64 常量并 commit

name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.8.0 / v0.8.0-rc1)'
        required: true

permissions:
  contents: write  # 允许 gh release create / upload

jobs:
  # ===== Stage 1: 跨平台 build matrix =====
  build:
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # v0.8.0 仅 stable + Windows/macOS 双平台 + Intel (amd64) 单架构
        # Linux / arm64 暂不在 v0.8.0 范围（plan v0.8.0.md 红线）
        include:
          - os: macos-14
            platform: darwin
            arch: amd64
            artifact: gitea-kanban-macos-amd64
            output: gitea-kanban.app
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: gitea-kanban-windows-amd64
            output: gitea-kanban.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
        shell: bash

      - name: 前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 前端 build（生成 dist/ 给 Go embed）
        working-directory: frontend
        run: pnpm run build

      - name: 前端 typecheck
        working-directory: frontend
        run: pnpm run typecheck

      # 必须放在 pnpm build 之后：main.go 用 //go:embed all:frontend/dist 嵌入前端资源，
      # 没有 dist/ 会导致 go build 和 go test 一起 setup failed（FAIL: pattern all:frontend/dist: no matching files）
      # 用 GOOS/GOARCH env 显式指定（windows runner 默认 GOARCH=amd64 但 darwin-14 runner 是 arm64；
      # 必须显式 amd64 才能嵌入 windows 二进制 + macOS Intel 二进制）
      # 注意：windows runner 的 shell 是 PowerShell，GOOS=windows go test 这种 env inline 写法不可用，
      # 必须用 GitHub Actions env 字段（PowerShell 通过 $env:GOOS 读）
      - name: Go 测试（含 cmd/sign + app/updater）
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: go test ./... -count=1

      # macOS / Windows 都用 wails build 加 -ldflags 注入版本号
      - name: 构建（macOS / Windows 通用）
        run: |
          wails build \
            -platform ${{ matrix.platform }}/${{ matrix.arch }} \
            -clean \
            -o ${{ matrix.output }} \
            -ldflags "-X main.appVersion=${{ github.ref_name }} -X main.appChannel=stable"
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.output }}
          if-no-files-found: error

  # ===== Stage 2: sign + publish =====
  publish:
    name: sign · manifest · publish
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 下载 2 个 build artifact
      - name: 下载 macOS amd64 build
        uses: actions/download-artifact@v4
        with:
          name: gitea-kanban-macos-amd64
          path: build/bin/

      - name: 下载 Windows amd64 build
        uses: actions/download-artifact@v4
        with:
          name: gitea-kanban-windows-amd64
          path: build/bin/

      - name: 检查必需 secrets
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
        run: |
          if [[ -z "$SIGN_PRIVATE_KEY" ]]; then
            echo "ERROR: SIGN_PRIVATE_KEY secret is empty"
            exit 1
          fi
          if [[ -z "$SIGN_PASSWORD" ]]; then
            echo "ERROR: SIGN_PASSWORD secret is empty"
            exit 1
          fi

      # macOS .app 是 directory，需要 zip 打包成可上传的 asset
      - name: 打包 macOS .app
        run: |
          cd build/bin
          if [[ -d gitea-kanban.app ]]; then
            zip -r gitea-kanban-macos-amd64.zip gitea-kanban.app
          fi

      # Windows .exe 直接作为 asset
      - name: 准备 assets 列表
        id: prepare_assets
        run: |
          ls -la build/bin/

      # 写私钥到临时文件 + chmod 600
      - name: 写签名私钥（临时）
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          echo "$SIGN_PRIVATE_KEY" > build/bin/private.b64
          chmod 600 build/bin/private.b64

      # 对每个 asset 签 .sig
      - name: ed25519 sign assets
        env:
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
        run: |
          go run ./cmd/sign sign \
            --key build/bin/private.b64 \
            --password "$SIGN_PASSWORD" \
            build/bin/gitea-kanban-macos-amd64.zip \
            build/bin/gitea-kanban-windows-amd64.exe \
            build/bin/latest.json
        shell: bash

      # 生成 manifest（latest.json）
      - name: 生成 manifest
        env:
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
        run: |
          go run ./cmd/sign manifest \
            --version ${{ github.ref_name }} \
            --notes docs/releases/${{ github.ref_name }}.md \
            --repo ${{ github.repository }} \
            build/bin/gitea-kanban-macos-amd64.zip \
            build/bin/gitea-kanban-windows-amd64.exe \
            > build/bin/latest.json
        shell: bash

      # 验证 manifest + sig 链完整
      - name: 验证产物完整性
        run: |
          ls -la build/bin/
          echo "---"
          cat build/bin/latest.json | head -20

      # gh release create
      - name: 创建 / 更新 GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 兼容 rc tag（如 v0.8.0-rc1）使用 --prerelease
          if [[ "${{ github.ref_name }}" == *"-rc"* ]] || [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            PRE_RELEASE_FLAG="--prerelease"
          else
            PRE_RELEASE_FLAG=""
          fi

          # 先看 release 是否已存在（workflow_dispatch 重跑场景）
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} 已存在，删除旧的再重建"
            gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes
          fi

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "gitea-kanban ${{ github.ref_name }}" \
            --notes-file "docs/releases/${{ github.ref_name }}.md" \
            $PRE_RELEASE_FLAG \
            build/bin/gitea-kanban-macos-amd64.zip \
            build/bin/gitea-kanban-windows-amd64.exe \
            build/bin/latest.json \
            build/bin/*.sig
        shell: bash

      - name: 清理临时私钥
        run: rm -f build/bin/private.b64
        shell: bash

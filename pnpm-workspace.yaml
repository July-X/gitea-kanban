# pnpm 11.x workspace 配置
#
# 关键点（pnpm 11 与早期版本不同）：
# - allowBuilds 是 key-value 形式（pnpm 10 是 onlyBuiltDependencies 数组）
# - 任何带 native binding / postinstall 的包都必须显式列出，否则被 ignore-builds
#
# 本项目：
# - better-sqlite3: 原生 C++ 编译，需要 prebuild 或本地 node-gyp
# - electron: Electron 二进制安装（@electron/rebuild 会处理）
# - @napi-rs/keyring*: NAPI prebuild，不需要 build
#
# 参考：docs/adr/0001-keychain.md §7.1（pnpm 11 install 命令校正）

packages:
  - "."

# 允许 native build 的包白名单
# - better-sqlite3: 原生 C++ 编译，需要 prebuild 或本地 node-gyp
# - electron: Electron 二进制安装（@electron/rebuild 会处理）
# - esbuild: postinstall 选 platform-specific prebuild binary（pnpm 11 缺它会 ERR）
allowBuilds:
  better-sqlite3: true
  electron: true
  # electron-winstaller: electron-builder 的 Windows 打包器子依赖（macOS 用不上）
  # pnpm 11.5+ 把 "set this to true or false" 字面量写进 lockfile 是 install 时的占位符
  # 实际不会执行任何 postinstall 脚本（macOS 平台），true/false 等价
  electron-winstaller: true
  esbuild: true
  # vue-demi 是 @antv/x6-vue-shape 的 Vue 2/3 兼容垫片
  # 在 Vue 3 项目里实际是 no-op（pinia 3+ / x6-vue-shape 3+ 已不依赖其运行时行为）
  # 不需要 build 脚本——明确禁止以避免 pnpm 11 ERR_PNPM_IGNORED_BUILDS
  vue-demi: false
